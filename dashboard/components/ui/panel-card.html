<!-- Panel Card Component -->
<div class="panel-card bg-[var(--color-bg-panel)] border border-[var(--color-border-subtle)] 
             rounded-lg p-5 hover:border-[var(--color-border-accent)] hover:shadow-[0_0_20px_rgba(0,200,83,0.1)] 
             transition-all duration-300 animate-fade-in">
  <div class="panel-header flex items-center justify-between mb-4 pb-3 border-b border-[var(--color-border-subtle)]">
    <h3 class="text-[var(--color-text-accent)] font-bold uppercase tracking-wider text-sm">
      {% panelTitle %}
    </h3>
    <div class="panel-icon text-[var(--color-text-muted)]">[#]</div>
  </div>
  <div class="panel-content">
    {% panelContent %}
  </div>
</div>
