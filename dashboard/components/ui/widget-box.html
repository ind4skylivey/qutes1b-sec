<!-- Widget Box Component -->
<div class="widget-box bg-[var(--color-bg-body)] border border-[var(--color-border-subtle)]
             rounded-lg p-4">
  <div class="widget-header text-[var(--color-text-muted)] text-xs uppercase tracking-wider mb-3">
    {% widgetTitle %}
  </div>
  <div class="widget-content">
    {% widgetContent %}
  </div>
</div>
