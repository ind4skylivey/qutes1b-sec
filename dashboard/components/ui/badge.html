<!-- Badge Component -->
<span class="badge inline-flex items-center gap-1.5 px-3 py-1 rounded
            text-xs font-semibold
            {% if variant === 'oscp' %}bg-[rgba(0,200,83,0.15)] text-[var(--color-text-accent)] border border-[rgba(0,200,83,0.3)]
            {% elif variant === 'redteam' %}bg-[rgba(255,0,60,0.15)] text-[#ff003c] border border-[rgba(255,0,60,0.3)]
            {% elif variant === 'rust' %}bg-[rgba(255,102,51,0.15)] text-[#ff6633] border border-[rgba(255,102,51,0.3)]
            {% else %}bg-[var(--color-bg-panel)] text-[var(--color-text-muted)] border border-[var(--color-border-subtle)]
            {% endif %}">
  <span class="w-2 h-2 rounded-full
              {% if variant === 'oscp' %}bg-[var(--color-text-accent)]
              {% elif variant === 'redteam' %}bg-[#ff003c]
              {% else %}bg-[var(--color-border-subtle)]
              {% endif %}"></span>
  {% badgeLabel %}
</span>
