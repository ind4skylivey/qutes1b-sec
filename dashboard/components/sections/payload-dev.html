<!-- Payload Dev Component -->
<div class="panel-content">
  <div class="link-list">
    {% for link in links %}
    <li class="link-item">
      <a href="{% link.url %}" target="_blank" rel="noopener noreferrer"
         class="link-anchor flex items-center gap-2 p-2 rounded
                text-[var(--color-text-primary)] hover:text-[var(--color-text-accent)]
                hover:bg-[rgba(0,200,83,0.05)]
                transition-colors duration-200 group">
        <span class="link-icon text-[var(--color-text-muted)] group-hover:text-[var(--color-text-accent)]">>_</span>
        <span class="link-text font-medium">{% link.label %}</span>
        <span class="link-external text-[var(--color-text-muted)] opacity-0 group-hover:opacity-100 transition-opacity">↗</span>
      </a>
    </li>
    {% endfor %}
  </div>
</div>
