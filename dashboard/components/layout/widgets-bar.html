<!-- Widgets Bar Component -->
<div class="widgets-bar bg-[var(--color-bg-body)] border-b border-[var(--color-border-subtle)]">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <!-- Clock: London -->
      <div class="widget-box text-center">
        <div class="widget-header">🇬🇧 LONDON</div>
        <div class="clock-display text-lg md:text-xl font-bold text-[var(--color-text-accent)]"
             id="london-clock">
          --:--:--
        </div>
      </div>

      <!-- Clock: Thailand -->
      <div class="widget-box text-center">
        <div class="widget-header">🇹🇭 THAILAND</div>
        <div class="clock-display text-lg md:text-xl font-bold text-[var(--color-text-accent)]"
             id="thailand-clock">
          --:--:--
        </div>
      </div>

      <!-- System Stats -->
      <div class="widget-box col-span-2 md:col-span-2">
        <div class="widget-header">🖥 SYSTEM STATS</div>
        <div class="system-stats grid grid-cols-2 gap-3">
          <div>
            <div class="flex justify-between text-xs mb-1">
              <span class="text-[var(--color-text-muted)]">CPU</span>
              <span class="text-[var(--color-text-primary)]" id="cpu-value">0%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill bg-[var(--color-text-accent)]"
                   style="width: 0%"
                   id="cpu-bar"></div>
            </div>
          </div>
          <div>
            <div class="flex justify-between text-xs mb-1">
              <span class="text-[var(--color-text-muted)]">RAM</span>
              <span class="text-[var(--color-text-primary)]" id="ram-value">0%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill bg-[var(--color-text-accent)]"
                   style="width: 0%"
                   id="ram-bar"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
