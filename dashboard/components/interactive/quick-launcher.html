<!-- Quick Launcher Component -->
<div class="panel-content">
  <div class="flex items-center justify-between mb-3">
    <h3 class="text-[var(--color-text-accent)] font-bold uppercase tracking-wider text-sm">
      /// QUICK_LAUNCHER
    </h3>
    <span class="badge">TOOLS</span>
  </div>

  <div class="quick-launcher grid grid-cols-4 md:grid-cols-8 gap-2">
    <button class="launch-btn flex flex-col items-center gap-1 p-3 rounded-lg bg-[var(--color-bg-body)] border border-[var(--color-border-subtle)]
                  text-[var(--color-text-primary)] hover:text-[var(--color-text-accent)]
                  hover:bg-[var(--color-text-accent)] hover:text-[var(--color-bg-body)]
                  hover:border-[var(--color-text-accent)]
                  transition-colors duration-200 font-mono text-xs"
            data-tool="nmap" data-cmd="nmap">
      <span class="font-bold">nmap</span>
    </button>

    <button class="launch-btn flex flex-col items-center gap-1 p-3 rounded-lg bg-[var(--color-bg-body)] border border-[var(--color-border-subtle)]
                  text-[var(--color-text-primary)] hover:text-[var(--color-text-accent)]
                  hover:bg-[var(--color-text-accent)] hover:text-[var(--color-bg-body)]
                  hover:border-[var(--color-text-accent)]
                  transition-colors duration-200 font-mono text-xs"
            data-tool="rustscan" data-cmd="rustscan">
      <span class="font-bold">rs</span>
    </button>

    <button class="launch-btn flex flex-col items-center gap-1 p-3 rounded-lg bg-[var(--color-bg-body)] border border-[var(--color-border-subtle)]
                  text-[var(--color-text-primary)] hover:text-[var(--color-text-accent)]
                  hover:bg-[var(--color-text-accent)] hover:text-[var(--color-bg-body)]
                  hover:border-[var(--color-text-accent)]
                  transition-colors duration-200 font-mono text-xs"

      <span class="font-bold">gb</span>
    </button>

    <button class="launch-btn flex flex-col items-center gap-1 p-3 rounded-lg bg-[var(--color-bg-body)] border border-[var(--color-border-subtle)]
                  text-[var(--color-text-primary)] hover:text-[var(--color-text-accent)]
                  hover:bg-[var(--color-text-accent)] hover:text-[var(--color-bg-body)]
                  hover:border-[var(--color-text-accent)]
                  transition-colors duration-200 font-mono text-xs"
            data-tool="sqlmap" data-cmd="sqlmap">
      <span class="font-bold">smap</span>
    </button>

    <button class="launch-btn flex flex-col items-center gap-1 p-3 rounded-lg bg-[var(--color-bg-body)] border border-[var(--color-border-subtle)]
                  text-[var(--color-text-primary)] hover:text-[var(--color-text-accent)]

                  hover:border-[var(--color-text-accent)]
                  transition-colors duration-200 font-mono text-xs"

      <span class="font-bold">hydra</span>
    </button>

    <button class="launch-btn flex flex-col items-center gap-1 p-3 rounded-lg bg-[var(--color-bg-body)] border border-[var(--color-border-subtle)]
                  text-[var(--color-text-primary)] hover:text-[var(--color-text-accent)]
                  hover:bg-[var(--color-text-accent)] hover:text-[var(--color-bg-body)]
                  hover:border-[var(--color-text-accent)]
                  transition-colors duration-200 font-mono text-xs"
            data-tool="msfconsole" data-cmd="msfconsole">
      <span class="font-bold">msf</span>
    </button>

    <button class="launch-btn flex flex-col items-center gap-1 p-3 rounded-lg bg-[var(--color-bg-body)] border border-[var(--color-border-subtle)]
                  text-[var(--color-text-primary)] hover:text-[var(--color-text-accent)]
                  hover:bg-[var(--color-text-accent)] hover:text-[var(--color-bg-body)]

            data-tool="burp" data-cmd="burp">
      <span class="font-bold">brp</span>
    </button>

    <button class="launch-btn flex flex-col items-center gap-1 p-3 rounded-lg bg-[var(--color-bg-body)] border border-[var(--color-border-subtle)]
                  text-[var(--color-text-primary)] hover:text-[var(--color-text-accent)]
                  hover:bg-[var(--color-text-accent)] hover:text-[var(--color-bg-body)]
                  hover:border-[var(--color-text-accent)]
                  transition-colors duration-200 font-mono text-xs"
            data-tool="wireshark" data-cmd="wireshark">
      <span class="font-bold">wst</span>
    </button>
  </div>
</div>
