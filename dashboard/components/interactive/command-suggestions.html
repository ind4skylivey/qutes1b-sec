<!-- Command Suggestions Component -->
<div class="command-suggestions text-left">
  {% for command in commands %}
  <div class="suggestion-item px-3 py-2 cursor-pointer text-[var(--color-text-primary)] hover:bg-[rgba(0,200,83,0.05)] hover:border-l-2 hover:border-[var(--color-text-accent)] transition-all duration-200">
    <div class="flex items-center gap-2">
      <span class="suggestion-cmd font-bold text-[var(--color-text-accent)] text-xs">{% command %}</span>
      <span class="suggestion-desc text-[var(--color-text-muted)] text-xs">{% desc %}</span>
    </div>
  </div>
  {% endfor %}
</div>
